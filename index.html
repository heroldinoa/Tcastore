<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>T.castore</title><style>

body{
margin:0;
font-family:Arial;
background:#f1f1f1;
}

.header{
background:#0071ce;
color:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:10px 15px;
}

.logo{
font-size:22px;
font-weight:bold;
}

.search input{
padding:8px;
width:200px;
border:none;
border-radius:5px;
}

.cart{
font-size:20px;
cursor:pointer;
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:15px;
}

.product{
background:white;
padding:10px;
border-radius:8px;
text-align:center;
}

.product img{
width:100%;
height:140px;
object-fit:cover;
}

button{
background:#0071ce;
color:white;
border:none;
padding:8px 10px;
border-radius:5px;
margin-top:5px;
}

#cartBox{
position:fixed;
right:0;
top:60px;
width:250px;
background:white;
box-shadow:0 0 10px rgba(0,0,0,0.2);
padding:10px;
display:none;
}

</style></head><body><div class="header"><div class="logo">T.castore</div><div class="search">
<input placeholder="Search produit">
</div><div class="cart" onclick="toggleCart()">
🛒 <span id="count">0</span>
</div></div><div class="products"><div class="product">
<img src="https://via.placeholder.com/150">
<h3>Dove</h3>
<p>$5</p>
<button onclick="add('Dove',5)">Ajouter</button>
</div><div class="product">
<img src="https://via.placeholder.com/150">
<h3>Secret</h3>
<p>$7</p>
<button onclick="add('Secret',7)">Ajouter</button>
</div><div class="product">
<img src="https://via.placeholder.com/150">
<h3>Parfum</h3>
<p>$15</p>
<button onclick="add('Parfum',15)">Ajouter</button>
</div><div class="product">
<img src="https://via.placeholder.com/150">
<h3>Vaseline</h3>
<p>$6</p>
<button onclick="add('Vaseline',6)">Ajouter</button>
</div><div class="product">
<img src="https://via.placeholder.com/150">
<h3>CeraVe</h3>
<p>$12</p>
<button onclick="add('CeraVe',12)">Ajouter</button>
</div></div><div id="cartBox"><h3>Cart</h3><ul id="items"></ul><p>Total: $<span id="total">0</span></p><p>🚚 Livraison gratis</p><button onclick="natcash()">Natcash</button>

<button onclick="moncash()">MonCash</button>

</div><script>

let cart=[]
let total=0

function add(name,price){

cart.push({name,price})

total+=price

update()

}

function update(){

let list=document.getElementById("items")

list.innerHTML=""

cart.forEach((item,index)=>{

list.innerHTML +=
"<li>"+item.name+" $"+item.price+
" <button onclick='remove("+index+")'>X</button></li>"

})

document.getElementById("total").innerText=total

document.getElementById("count").innerText=cart.length

}

function remove(index){

total -= cart[index].price

cart.splice(index,1)

update()

}

function toggleCart(){

let box=document.getElementById("cartBox")

if(box.style.display=="block"){
box.style.display="none"
}else{
box.style.display="block"
}

}

function natcash(){

alert("Peye sou Natcash: 35206180")

}

function moncash(){

alert("Peye sou MonCash: 35206180")

}

</script></body></html>
