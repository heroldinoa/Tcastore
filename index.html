<!DOCTYPE html>
<html>
<head>
<title>T.castore</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#0071ce;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
font-weight:bold;
}

.search{
width:90%;
padding:10px;
margin:10px;
border-radius:8px;
border:none;
}

.products{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:10px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

button{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:8px;
font-weight:bold;
}

.add{
background:#0071ce;
color:white;
}

.order{
background:#2ecc71;
color:white;
}

.cartBox{
position:fixed;
top:60px;
right:10px;
background:white;
padding:10px;
border-radius:10px;
width:200px;
display:none;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50px;
text-decoration:none;
}

</style>

</head>

<body>

<header>

<h2>T.castore</h2>

<nav>
<a href="#">Home</a>
<a href="#">Login</a>
<a href="#">Register</a>
<a href="#" onclick="toggleCart()">🛒 <span id="count">0</span></a>
</nav>

</header>

<input class="search" placeholder="Recherche produit...">

<div class="products">

<div class="card">
<img src="https://i.imgur.com/7yUvePI.png">
<h3>Dove</h3>
<p>$5</p>
<button class="add" onclick="addItem('Dove')">Ajouter</button>
<button class="order">Commander</button>
</div>

<div class="card">
<img src="https://i.imgur.com/6qK9XbT.png">
<h3>Secret</h3>
<p>$7</p>
<button class="add" onclick="addItem('Secret')">Ajouter</button>
<button class="order">Commander</button>
</div>

<div class="card">
<img src="https://i.imgur.com/1H9Z1ZK.png">
<h3>Vaseline</h3>
<p>$4</p>
<button class="add" onclick="addItem('Vaseline')">Ajouter</button>
<button class="order">Commander</button>
</div>

<div class="card">
<img src="https://i.imgur.com/4YQZ4sO.png">
<h3>Cerave</h3>
<p>$10</p>
<button class="add" onclick="addItem('Cerave')">Ajouter</button>
<button class="order">Commander</button>
</div>

</div>

<div class="cartBox" id="cart">
<h4>Panier</h4>
<ul id="list"></ul>

<p>Livraison: Gratuit</p>

<button onclick="pay('Moncash')">Payer Moncash</button>
<button onclick="pay('Natcash')">Payer Natcash</button>

</div>

<a class="whatsapp" href="https://wa.me/50935206180">WhatsApp</a>

<script>

let cart=[]

function addItem(name){
cart.push(name)
document.getElementById("count").innerText=cart.length

let li=document.createElement("li")
li.innerText=name

let btn=document.createElement("button")
btn.innerText="X"
btn.onclick=function(){
li.remove()
cart.pop()
document.getElementById("count").innerText=cart.length
}

li.appendChild(btn)

document.getElementById("list").appendChild(li)
}

function toggleCart(){
let box=document.getElementById("cart")

if(box.style.display=="block"){
box.style.display="none"
}else{
box.style.display="block"
}
}

function pay(type){
alert("Payer avec "+type)
}

</script>

</body>
</html>
