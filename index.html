<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>T.castore</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#0071ce;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
font-weight:bold;
}

.section{
display:none;
padding:20px;
}

.products{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
font-weight:bold;
}

.add{background:#0071ce;color:white;}
.order{background:#2ecc71;color:white;}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50px;
text-decoration:none;
}

</style>
</head>

<body>

<header>

<h2>T.castore</h2>

<nav>
<a href="#" onclick="show('home')">Home</a>
<a href="#" onclick="show('login')">Login</a>
<a href="#" onclick="show('register')">Register</a>
</nav>

</header>

<div style="padding:10px">
📞 35206180 | 🚚 Livraison gratuite
</div>

<div id="home" class="section" style="display:block">

<div class="products">

<div class="card">
<img src="https://i.imgur.com/7yUvePI.png">
<h3>Dove</h3>
<p>$5</p>
<button class="add">Ajouter</button>
<button class="order" onclick="order('Dove')">Commander</button>
</div>

<div class="card">
<img src="https://i.imgur.com/6qK9XbT.png">
<h3>Secret</h3>
<p>$7</p>
<button class="add">Ajouter</button>
<button class="order" onclick="order('Secret')">Commander</button>
</div>

<div class="card">
<img src="https://i.imgur.com/1H9Z1ZK.png">
<h3>Vaseline</h3>
<p>$4</p>
<button class="add">Ajouter</button>
<button class="order" onclick="order('Vaseline')">Commander</button>
</div>

<div class="card">
<img src="https://i.imgur.com/4YQZ4sO.png">
<h3>Cerave</h3>
<p>$10</p>
<button class="add">Ajouter</button>
<button class="order" onclick="order('Cerave')">Commander</button>
</div>

</div>
</div>

<div id="login" class="section">

<h2>Login</h2>

<input placeholder="Email"><br><br>
<input placeholder="Password" type="password"><br><br>

<button onclick="alert('Connexion réussie')">Login</button>

</div>

<div id="register" class="section">

<h2>Register</h2>

<input placeholder="Nom"><br><br>
<input placeholder="Email"><br><br>
<input placeholder="Password" type="password"><br><br>

<button onclick="alert('Compte créé')">Register</button>

</div>

<a class="whatsapp" href="https://wa.me/50935206180">WhatsApp</a>

<script>

function show(page){

document.getElementById("home").style.display="none"
document.getElementById("login").style.display="none"
document.getElementById("register").style.display="none"

document.getElementById(page).style.display="block"

}

function order(product){

let message="Bonjour je veux commander "+product

window.open("https://wa.me/50935206180?text="+message)

}

</script>

</body>
</html>
