<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><title>T.castore</title><style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

.header{
background:black;
color:gold;
padding:15px;
text-align:center;
}

.search{
padding:10px;
background:white;
margin:10px;
border-radius:30px;
}

.search input{
width:100%;
border:none;
outline:none;
font-size:16px;
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.product{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
}

.product img{
width:100%;
height:130px;
object-fit:cover;
}

.price{
color:green;
font-weight:bold;
}

button{
background:black;
color:gold;
border:none;
padding:10px;
border-radius:6px;
margin-top:5px;
}

.cart{
position:fixed;
top:10px;
right:10px;
background:white;
padding:10px;
border-radius:20px;
font-weight:bold;
}

#cartBox{
display:none;
position:fixed;
bottom:0;
width:100%;
background:white;
padding:20px;
box-shadow:0 -3px 10px rgba(0,0,0,0.3);
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
text-decoration:none;
}

</style></head><body><div class="header">
<h2>T.castore</h2>
<p>Cosmétiques & Parfum</p>
</div><div class="search">
<input placeholder="Search produit...">
</div><div class="products"><div class="product">
<img src="vaseline.jpg">
<h3>Vaseline</h3>
<div class="price">$6</div>
<button onclick="addCart('Vaseline',6)">Ajouter</button>
</div><div class="product">
<img src="dove.jpg">
<h3>Dove</h3>
<div class="price">$5</div>
<button onclick="addCart('Dove',5)">Ajouter</button>
</div><div class="product">
<img src="cerave.jpg">
<h3>CeraVe</h3>
<div class="price">$12</div>
<button onclick="addCart('CeraVe',12)">Ajouter</button>
</div><div class="product">
<img src="secret.jpg">
<h3>Secret</h3>
<div class="price">$7</div>
<button onclick="addCart('Secret',7)">Ajouter</button>
</div><div class="product">
<img src="parfum.jpg">
<h3>Parfum</h3>
<div class="price">$20</div>
<button onclick="addCart('Parfum',20)">Ajouter</button>
</div></div><div class="cart" onclick="toggleCart()">
🛒 <span id="count">0</span>
</div><div id="cartBox"><h3>Panier</h3><ul id="items"></ul>Total: $<span id="total">0</span>

<br><br>

<button onclick="order()">Commander</button>

</div><a class="whatsapp" href="https://wa.me/50935206180">💬</a>

<script>

let cart=[]
let total=0

function addCart(name,price){

cart.push({name,price})
total+=price

update()

}

function update(){

document.getElementById("count").innerText=cart.length
document.getElementById("total").innerText=total

let list=document.getElementById("items")
list.innerHTML=""

cart.forEach(i=>{
list.innerHTML+=`<li>${i.name} $${i.price}</li>`
})

}

function toggleCart(){

let box=document.getElementById("cartBox")

box.style.display=box.style.display=="block"?"none":"block"

}

function order(){

let text="Bonjour mwen vle kòmande: "

cart.forEach(i=>{
text+=i.name+" "
})

let url="https://wa.me/50935206180?text="+encodeURIComponent(text)

window.open(url)

}

</script></body>
</html>
