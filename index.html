<!DOCTYPE html>
<html>
<head>

<title>T.castore</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#1976d2;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav a{
color:white;
margin-left:15px;
text-decoration:none;
font-weight:bold;
}

.search{
padding:15px;
background:white;
}

.search input{
width:100%;
padding:12px;
border-radius:6px;
border:1px solid #ccc;
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:15px;
}

.product{
background:white;
padding:12px;
border-radius:10px;
text-align:center;
}

.product img{
width:100%;
height:140px;
object-fit:cover;
border-radius:8px;
}

button{
background:#1976d2;
color:white;
border:none;
padding:10px;
border-radius:6px;
width:100%;
margin-top:8px;
}

</style>

</head>

<body>

<header>

<h2>T.castore</h2>

<nav>
<a href="#">Home</a>
<a href="#">Login</a>
<a href="#">Register</a>
<a href="#">🛒0</a>
</nav>

</header>


<div class="search">

<input placeholder="Search produit...">

</div>


<div class="products">

<div class="product">

<img src="https://i.imgur.com/Wp9kK7K.jpg">

<h3>Dove</h3>

<p>$5</p>

<button>Ajouter</button>

</div>


<div class="product">

<img src="https://i.imgur.com/5n6XK7E.jpg">

<h3>Secret</h3>

<p>$7</p>

<button>Ajouter</button>

</div>


<div class="product">

<img src="https://i.imgur.com/5ZC8B6R.jpg">

<h3>Vaseline</h3>

<p>$6</p>

<button>Ajouter</button>

</div>


<div class="product">

<img src="https://i.imgur.com/Tj8Kp9T.jpg">

<h3>Cerave</h3>

<p>$12</p>

<button>Ajouter</button>

</div>

</div>

</body>
</html>
