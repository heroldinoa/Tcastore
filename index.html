<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>T.castore</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

header{
background:#0071ce;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
font-weight:bold;
}

.products{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:15px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
font-weight:bold;
}

.add{background:#0071ce;color:white;}
.order{background:#2ecc71;color:white;}

.cartBox{
position:fixed;
top:70px;
right:10px;
background:white;
padding:10px;
border-radius:10px;
width:200px;
display:none;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.section{
display:none;
padding:20px;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50px;
text-decoration:none;
}

</style>

</head>

<body>

<header>

<h2>T.castore</h2>

<nav>

<a href="#" onclick="show('home')">Home</a>
<a href="#" onclick="show('login')">Login</a>
<a href="#" onclick="show('register')">Register</a>

<a href="#" onclick="toggleCart()">🛒 <span id="count">0</span></a>

</nav>

</header>

<div style="padding:10px">
📞 35206180 | 🚚 Livraison gratuite
</div>

<div id="home" class="section" style="display:block">

<div class="products">

<div class="card">
<img src="https://i.imgur.com/7yUvePI.png">
<h3>Dove</h3>
<p>$5</p>
<button class="add" onclick="addItem('Dove')">Ajouter</button>
<button class="order" onclick="order()">Commander</button>
</div>

<div class="card">
<img src="https://i.imgur.com/6qK9XbT.png">
<h3>Secret</h3>
<p>$7</p>
<button class="add" onclick="addItem('Secret')">Ajouter</button>
<button class="order" onclick="order()">Commander</button>
</div>

<div class="card">
<img src="https://i.imgur.com/1H9Z1ZK.png">
<h3>Vaseline</h3>
<p>$4</p>
<button class="add" onclick="addItem('Vaseline')">Ajouter</button>
<button class="order" onclick="order()">Commander</button>
</div>

<div class="card">
<img src="https://i.imgur.com/4YQZ4sO.png">
<h3>Cerave</h3>
<p>$10</p>
<button class="add" onclick="addItem('Cerave')">Ajouter</button>
<button class="order" onclick="order()">Commander</button>
</div>

</div>

</div>

<div id="login" class="section">

<h2>Login</h2>

<input placeholder="Email"><br><br>
<input placeholder="Password" type="password"><br><br>

<button onclick="alert('Connexion réussie')">Login</button>

</div>

<div id="register" class="section">

<h2>Register</h2>

<input placeholder="Nom"><br><br>
<input placeholder="Email"><br><br>
<input placeholder="Password" type="password"><br><br>

<button onclick="alert('Compte créé')">Register</button>

</div>

<div class="cartBox" id="cart">

<h3>Panier</h3>

<ul id="cartList"></ul>

<button class="order" onclick="order()">Commander</button>

</div>

<a class="whatsapp" href="https://wa.me/50935206180">WhatsApp</a>

<script>

let cart=[]

function addItem(name){

cart.push(name)

document.getElementById("count").innerText=cart.length

let li=document.createElement("li")

li.innerText=name

let btn=document.createElement("button")

btn.innerText="X"

btn.onclick=function(){

li.remove()

cart.pop()

document.getElementById("count").innerText=cart.length

}

li.appendChild(btn)

document.getElementById("cartList").appendChild(li)

}

function toggleCart(){

let box=document.getElementById("cart")

if(box.style.display=="block"){
box.style.display="none"
}else{
box.style.display="block"
}

}

function show(page){

document.getElementById("home").style.display="none"
document.getElementById("login").style.display="none"
document.getElementById("register").style.display="none"

document.getElementById(page).style.display="block"

}

function order(){

let message="Bonjour je veux commander: "+cart.join(",")

window.open("https://wa.me/50935206180?text="+message)

}

</script>

</body>
</html>
