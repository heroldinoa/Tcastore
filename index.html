<!DOCTYPE html>
<html>
<head>
<title>T.castore</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f3f3f3;
}

header{
background:#1976d2;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
font-weight:bold;
}

.search{
background:#1976d2;
padding:15px;
}

.search input{
width:100%;
padding:12px;
border-radius:25px;
border:none;
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:15px;
}

.product{
background:white;
border-radius:12px;
padding:15px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.product img{
width:100%;
height:140px;
object-fit:cover;
border-radius:10px;
}

.product h3{
margin:10px 0 5px;
}

.product p{
font-size:18px;
}

button{
background:#1976d2;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
margin-top:8px;
}

</style>

</head>

<body>

<header>

<h2>T.castore</h2>

<nav>
<a href="#">Home</a>
<a href="#">Login</a>
<a href="#">Register</a>
<a href="#">🛒 2</a>
</nav>

</header>

<div class="search">

<input placeholder="Search produit...">

</div>


<div class="products">

<div class="product">

<img src="https://m.media-amazon.com/images/I/61L3bH2qOIL.jpg">

<h3>Dove</h3>

<p>$5</p>

<button>Ajouter</button>

</div>


<div class="product">

<img src="https://m.media-amazon.com/images/I/61QKQ9K4GML.jpg">

<h3>Secret</h3>

<p>$7</p>

<button>Ajouter</button>

</div>


<div class="product">

<img src="https://m.media-amazon.com/images/I/71Q8VjYxE9L.jpg">

<h3>Parfum</h3>

<p>$15</p>

<button>Ajouter</button>

</div>


<div class="product">

<img src="https://m.media-amazon.com/images/I/71H8dQxYy7L.jpg">

<h3>Vaseline</h3>

<p>$6</p>

<button>Ajouter</button>

</div>

</div>

</body>
</html>
