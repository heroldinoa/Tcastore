<!DOCTYPE html>
<html>
<head>

<title>T.castore</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#1976d2;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:bold;
}

nav a{
color:white;
margin-left:15px;
text-decoration:none;
font-weight:bold;
cursor:pointer;
}

.products{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:15px;
}

.product{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
}

.product img{
width:100%;
height:140px;
object-fit:cover;
border-radius:8px;
}

button{
background:#1976d2;
color:white;
border:none;
padding:10px;
border-radius:8px;
width:100%;
margin-top:8px;
}

.page{
display:none;
}

.active{
display:block;
}

.cartItem{
background:white;
margin:10px;
padding:10px;
border-radius:8px;
display:flex;
justify-content:space-between;
}

</style>

</head>

<body>

<header>

<div class="logo">T.castore</div>

<nav>

<a onclick="showPage('home')">Home</a>
<a onclick="showPage('login')">Login</a>
<a onclick="showPage('register')">Register</a>
<a onclick="showPage('cartPage')">🛒 <span id="cartCount">0</span></a>

</nav>

</header>


<div id="home" class="page active">

<div class="products">

<div class="product">

<img src="https://images.unsplash.com/photo-1585386959984-a41552231658">

<h3>Dove</h3>

<p>$5</p>

<button onclick="addCart('Dove',5)">Ajouter</button>

</div>


<div class="product">

<img src="https://images.unsplash.com/photo-1611930022073-b7a4ba5fcccd">

<h3>Secret</h3>

<p>$7</p>

<button onclick="addCart('Secret',7)">Ajouter</button>

</div>


<div class="product">

<img src="https://images.unsplash.com/photo-1584464491033-06628f3a6b7b">

<h3>Vaseline</h3>

<p>$6</p>

<button onclick="addCart('Vaseline',6)">Ajouter</button>

</div>


<div class="product">

<img src="https://images.unsplash.com/photo-1608248597279-f99d160bfcbc">

<h3>Cerave</h3>

<p>$12</p>

<button onclick="addCart('Cerave',12)">Ajouter</button>

</div>

</div>

</div>


<div id="login" class="page">

<div style="padding:20px">

<h2>Login</h2>

<input placeholder="Email" style="width:100%;padding:10px;margin:10px 0">

<input placeholder="Password" style="width:100%;padding:10px;margin:10px 0">

<button>Login</button>

</div>

</div>


<div id="register" class="page">

<div style="padding:20px">

<h2>Create Account</h2>

<input placeholder="Name" style="width:100%;padding:10px;margin:10px 0">

<input placeholder="Email" style="width:100%;padding:10px;margin:10px 0">

<input placeholder="Password" style="width:100%;padding:10px;margin:10px 0">

<button>Register</button>

</div>

</div>


<div id="cartPage" class="page">

<h2 style="padding-left:15px">Cart</h2>

<div id="cartItems"></div>

</div>


<script>

let cart=[]
let count=0

function addCart(name,price){

cart.push({name,price})

count++

document.getElementById("cartCount").innerText=count

renderCart()

}

function removeItem(i){

cart.splice(i,1)

count--

document.getElementById("cartCount").innerText=count

renderCart()

}

function renderCart(){

let container=document.getElementById("cartItems")

container.innerHTML=""

cart.forEach((item,i)=>{

container.innerHTML+=`

<div class="cartItem">

${item.name} - $${item.price}

<button onclick="removeItem(${i})">Retire</button>

</div>

`

})

}

function showPage(page){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))

document.getElementById(page).classList.add("active")

}

</script>

</body>
</html>
