<!DOCTYPE html>
<html>
<head>
<title>T.castore</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#1976d2;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav a{
color:white;
margin-left:15px;
text-decoration:none;
font-weight:bold;
}

.search{
padding:15px;
background:#1976d2;
}

.search input{
width:100%;
padding:12px;
border-radius:20px;
border:none;
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
padding:20px;
}

.product{
background:white;
border-radius:10px;
padding:15px;
text-align:center;
}

.product img{
width:100%;
height:150px;
object-fit:cover;
border-radius:8px;
}

.product h3{
margin:10px 0;
}

.price{
font-size:18px;
font-weight:bold;
}

button{
background:#1976d2;
color:white;
border:none;
padding:10px;
border-radius:6px;
width:100%;
}

</style>

</head>

<body>

<header>

<h2>T.castore</h2>

<nav>
<a href="#">Home</a>
<a href="#">Login</a>
<a href="#">Register</a>
<a href="#">🛒0</a>
</nav>

</header>

<div class="search">
<input placeholder="Search produit...">
</div>

<div class="products">

<div class="product">
<img src="https://i.imgur.com/4YQZ1ZL.jpg">
<h3>Dove</h3>
<p class="price">$5</p>
<button>Ajouter</button>
</div>

<div class="product">
<img src="https://i.imgur.com/3ZQ3Z7O.jpg">
<h3>Secret</h3>
<p class="price">$7</p>
<button>Ajouter</button>
</div>

<div class="product">
<img src="https://i.imgur.com/9G8fR8T.jpg">
<h3>Parfum</h3>
<p class="price">$15</p>
<button>Ajouter</button>
</div>

<div class="product">
<img src="https://i.imgur.com/0KFBHTB.jpg">
<h3>Vaseline</h3>
<p class="price">$6</p>
<button>Ajouter</button>
</div>

<div class="product">
<img src="https://i.imgur.com/f3YJ0lY.jpg">
<h3>Cerave</h3>
<p class="price">$12</p>
<button>Ajouter</button>
</div>

</div>

</body>
</html>
