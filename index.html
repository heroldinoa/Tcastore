<!DOCTYPE html>
<html>
<head>

<title>T.castore</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#1976d2;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
font-weight:bold;
}

.search{
padding:15px;
background:#1976d2;
}

.search input{
width:100%;
padding:12px;
border-radius:20px;
border:none;
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:15px;
}

.product{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
}

.product img{
width:120px;
height:120px;
object-fit:cover;
}

button{
background:#1976d2;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
margin-top:10px;
}

.cartBox{
padding:20px;
display:none;
}

.loginBox, .registerBox{
display:none;
padding:20px;
}

input{
padding:10px;
width:100%;
margin:5px 0;
}

</style>
</head>

<body>

<header>

<h2>T.castore</h2>

<nav>

<a href="#" onclick="home()">Home</a>
<a href="#" onclick="login()">Login</a>
<a href="#" onclick="register()">Register</a>
<a href="#" onclick="cart()">🛒 <span id="cartCount">0</span></a>

</nav>

</header>


<div class="search">
<input type="text" placeholder="Search produit..." onkeyup="searchProduct(this.value)">
</div>


<div class="products" id="products">

<div class="product">
<img src="https://i.imgur.com/1bX5QH6.jpg">
<h3>Dove</h3>
<p>$5</p>
<button onclick="addCart('Dove',5)">Ajouter</button>
</div>

<div class="product">
<img src="https://i.imgur.com/BR3N6sT.jpg">
<h3>Secret</h3>
<p>$7</p>
<button onclick="addCart('Secret',7)">Ajouter</button>
</div>

<div class="product">
<img src="https://i.imgur.com/6yYx7R0.jpg">
<h3>Parfum</h3>
<p>$15</p>
<button onclick="addCart('Parfum',15)">Ajouter</button>
</div>

<div class="product">
<img src="https://i.imgur.com/Pr1s4vM.jpg">
<h3>Vaseline</h3>
<p>$6</p>
<button onclick="addCart('Vaseline',6)">Ajouter</button>
</div>

<div class="product">
<img src="https://i.imgur.com/7wKQZ8U.jpg">
<h3>Cerave</h3>
<p>$12</p>
<button onclick="addCart('Cerave',12)">Ajouter</button>
</div>

</div>


<div class="cartBox" id="cartBox">

<h2>Panye ou</h2>

<ul id="cartItems"></ul>

<p><b>Livrezon: GRATIS</b></p>

<button onclick="payMoncash()">Peye pa MonCash</button>

<button onclick="payNatcash()">Peye pa NatCash</button>

</div>


<div class="loginBox" id="loginBox">

<h2>Login</h2>

<input placeholder="Email">

<input type="password" placeholder="Password">

<button>Login</button>

</div>


<div class="registerBox" id="registerBox">

<h2>Register</h2>

<input placeholder="Name">

<input placeholder="Email">

<input type="password" placeholder="Password">

<button>Create account</button>

</div>



<script>

let cartList=[]
let count=0

function addCart(name,price){

cartList.push(name+" - $"+price)

count++

document.getElementById("cartCount").innerText=count

}

function cart(){

document.getElementById("products").style.display="none"
document.getElementById("loginBox").style.display="none"
document.getElementById("registerBox").style.display="none"
document.getElementById("cartBox").style.display="block"

let list=""

cartList.forEach(p=>{

list+="<li>"+p+"</li>"

})

document.getElementById("cartItems").innerHTML=list

}

function home(){

document.getElementById("products").style.display="grid"
document.getElementById("loginBox").style.display="none"
document.getElementById("registerBox").style.display="none"
document.getElementById("cartBox").style.display="none"

}

function login(){

document.getElementById("products").style.display="none"
document.getElementById("loginBox").style.display="block"
document.getElementById("registerBox").style.display="none"
document.getElementById("cartBox").style.display="none"

}

function register(){

document.getElementById("products").style.display="none"
document.getElementById("loginBox").style.display="none"
document.getElementById("registerBox").style.display="block"
document.getElementById("cartBox").style.display="none"

}

function payMoncash(){

window.location.href="https://moncashbutton.digicelgroup.com"

}

function payNatcash(){

window.location.href="https://natcash.com"

}

function searchProduct(value){

value=value.toLowerCase()

document.querySelectorAll(".product").forEach(p=>{

let name=p.innerText.toLowerCase()

if(name.includes(value)){

p.style.display="block"

}else{

p.style.display="none"

}

})

}

</script>

</body>
</html>
