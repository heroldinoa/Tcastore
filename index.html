<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><title>T.castore</title><style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

.header{
background:#0071ce;
color:white;
padding:15px;
font-size:22px;
text-align:center;
}

.search{
padding:10px;
background:#0071ce;
}

.search input{
width:100%;
padding:10px;
border-radius:20px;
border:none;
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.product{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
}

.product img{
width:100%;
height:120px;
}

button{
background:#0071ce;
color:white;
border:none;
padding:8px;
border-radius:6px;
margin-top:5px;
}

.footer{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
border-top:1px solid #ccc;
}

#cartBox{
position:fixed;
bottom:60px;
left:0;
width:100%;
background:white;
padding:20px;
display:none;
box-shadow:0 -3px 10px rgba(0,0,0,0.3);
max-height:300px;
overflow:auto;
}

#loginBox{
position:fixed;
bottom:60px;
left:0;
width:100%;
background:white;
padding:20px;
display:none;
box-shadow:0 -3px 10px rgba(0,0,0,0.3);
}

</style></head><body><div class="header">T.castore</div><div class="search">
<input placeholder="Search produit...">
</div><div id="products" class="products"><div class="product">
<img src="https://via.placeholder.com/150">
<h3>Secret</h3>
<p>$7</p>
<button onclick="add('Secret',7)">Ajouter</button>
</div><div class="product">
<img src="https://via.placeholder.com/150">
<h3>Parfum</h3>
<p>$15</p>
<button onclick="add('Parfum',15)">Ajouter</button>
</div><div class="product">
<img src="https://via.placeholder.com/150">
<h3>Dove</h3>
<p>$5</p>
<button onclick="add('Dove',5)">Ajouter</button>
</div><div class="product">
<img src="https://via.placeholder.com/150">
<h3>Vaseline</h3>
<p>$6</p>
<button onclick="add('Vaseline',6)">Ajouter</button>
</div></div><div id="cartBox"><h3>Panier</h3><ul id="cartItems"></ul><p>Total: $<span id="total">0</span></p><h3>Peye ak Natcash</h3><input placeholder="Natcash number"><button>Peye</button>

</div><div id="loginBox"><h3>Login</h3><input placeholder="Email">
<input placeholder="Password" type="password"><button>Login</button>

<h3>Register</h3><input placeholder="Nom">
<input placeholder="Email">
<input placeholder="Password"><button>Register</button>

</div><div class="footer"><button onclick="home()">🏠 Home</button>

<button onclick="openCart()">🛒 Cart</button>

<button onclick="openLogin()">👤 Account</button>

</div><script>

let cart=[]
let total=0

function add(name,price){

cart.push({name,price})

total+=price

updateCart()

}

function updateCart(){

let list=document.getElementById("cartItems")

list.innerHTML=""

cart.forEach((item,i)=>{

list.innerHTML+=
"<li>"+item.name+" $"+item.price+" <button onclick='removeItem("+i+")'>X</button></li>"

})

document.getElementById("total").innerText=total

}

function removeItem(i){

total-=cart[i].price

cart.splice(i,1)

updateCart()

}

function openCart(){

let box=document.getElementById("cartBox")

box.style.display=box.style.display=="block"?"none":"block"

}

function openLogin(){

let box=document.getElementById("loginBox")

box.style.display=box.style.display=="block"?"none":"block"

}

function home(){

document.getElementById("cartBox").style.display="none"

document.getElementById("loginBox").style.display="none"

}

</script></body></html>
