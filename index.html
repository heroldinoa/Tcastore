<!DOCTYPE html>
<html>
<head>
<title>T.castore</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f1f3f6;
}

header{
background:#1976d2;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:bold;
}

nav a{
color:white;
margin-left:15px;
text-decoration:none;
font-weight:bold;
}

.search{
padding:15px;
background:white;
}

.search input{
width:100%;
padding:12px;
border-radius:6px;
border:1px solid #ccc;
}

.products{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:15px;
}

.product{
background:white;
border-radius:10px;
padding:10px;
text-align:center;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.product img{
width:100%;
height:140px;
object-fit:cover;
border-radius:6px;
}

.price{
font-weight:bold;
margin:5px 0;
}

button{
background:#1976d2;
color:white;
border:none;
padding:10px;
border-radius:6px;
width:100%;
}

</style>

</head>

<body>

<header>

<div class="logo">T.castore</div>

<nav>
<a href="#">Home</a>
<a href="#">Login</a>
<a href="#">Register</a>
<a href="#">🛒 <span id="cart">0</span></a>
</nav>

</header>


<div class="search">
<input placeholder="Search produit...">
</div>


<div class="products">

<div class="product">
<img src="https://i.imgur.com/Wp9kK7K.jpg">
<h3>Dove</h3>
<p class="price">$5</p>
<button onclick="addCart()">Ajouter</button>
</div>

<div class="product">
<img src="https://i.imgur.com/5n6XK7E.jpg">
<h3>Secret</h3>
<p class="price">$7</p>
<button onclick="addCart()">Ajouter</button>
</div>

<div class="product">
<img src="https://i.imgur.com/5ZC8B6R.jpg">
<h3>Vaseline</h3>
<p class="price">$6</p>
<button onclick="addCart()">Ajouter</button>
</div>

<div class="product">
<img src="https://i.imgur.com/Tj8Kp9T.jpg">
<h3>Cerave</h3>
<p class="price">$12</p>
<button onclick="addCart()">Ajouter</button>
</div>

<div class="product">
<img src="https://i.imgur.com/2d4J9XU.jpg">
<h3>Parfum</h3>
<p class="price">$15</p>
<button onclick="addCart()">Ajouter</button>
</div>

</div>


<script>

let cart=0

function addCart(){
cart++
document.getElementById("cart").innerText=cart
}

</script>

</body>
</html>
