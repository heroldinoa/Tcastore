<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>T.castore</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

header{
background:#1976d2;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
font-weight:bold;
}

.info{
padding:10px;
background:#eee;
}

.products{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:15px;
}

.card{
background:white;
border-radius:10px;
padding:10px;
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:8px;
margin-top:5px;
font-weight:bold;
}

.add{
background:#1976d2;
color:white;
}

.order{
background:#2ecc71;
color:white;
}

.cartBox{
position:fixed;
top:70px;
right:10px;
background:white;
padding:10px;
border-radius:10px;
width:200px;
display:none;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
}

.section{
display:none;
padding:20px;
}

</style>

</head>

<body>

<header>

<h2>T.castore</h2>

<nav>

<a href="#" onclick="showPage('home')">Home</a>

<a href="#" onclick="showPage('login')">Login</a>

<a href="#" onclick="showPage('register')">Register</a>

<a href="#" onclick="toggleCart()">🛒 <span id="count">0</span></a>

</nav>

</header>

<div class="info">

📞 35206180 | 🚚 Livraison gratuite

</div>

<div id="home" class="section" style="display:block">

<div class="products">

<div class="card">

<img src="https://images.unsplash.com/photo-1585386959984-a41552231658">

<h3>Dove</h3>

<p>$5</p>

<button class="add" onclick="addItem('Dove')">Ajouter</button>

<button class="order" onclick="order()">Commander</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1596462502278-27bfdc403348">

<h3>Secret</h3>

<p>$7</p>

<button class="add" onclick="addItem('Secret')">Ajouter</button>

<button class="order" onclick="order()">Commander</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1608248597279-f99d160bfcbc">

<h3>Vaseline</h3>

<p>$4</p>

<button class="add" onclick="addItem('Vaseline')">Ajouter</button>

<button class="order" onclick="order()">Commander</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1556228724-4b4a1c7f9c5f">

<h3>Cerave</h3>

<p>$10</p>

<button class="add" onclick="addItem('Cerave')">Ajouter</button>

<button class="order" onclick="order()">Commander</button>

</div>

</div>

</div>

<div id="login" class="section">

<h2>Login</h2>

<input placeholder="Email"><br><br>

<input type="password" placeholder="Password"><br><br>

<button>Login</button>

</div>

<div id="register" class="section">

<h2>Register</h2>

<input placeholder="Nom"><br><br>

<input placeholder="Email"><br><br>

<input type="password" placeholder="Password"><br><br>

<button>Register</button>

</div>

<div class="cartBox" id="cart">

<h3>Panier</h3>

<ul id="cartList"></ul>

<button class="order" onclick="order()">Commander</button>

</div>

<a class="whatsapp" href="https://wa.me/50935206180">WhatsApp</a>

<script>

let cart=[]

function addItem(name){

cart.push(name)

document.getElementById("count").innerText=cart.length

let li=document.createElement("li")

li.innerText=name

document.getElementById("cartList").appendChild(li)

}

function toggleCart(){

let cartBox=document.getElementById("cart")

if(cartBox.style.display==="block"){

cartBox.style.display="none"

}else{

cartBox.style.display="block"

}

}

function showPage(page){

document.getElementById("home").style.display="none"

document.getElementById("login").style.display="none"

document.getElementById("register").style.display="none"

document.getElementById(page).style.display="block"

}

function order(){

let text="Bonjour je voudrais commander: "+cart.join(",")

window.open("https://wa.me/50935206180?text="+text)

}

</script>

</body>
</html>
