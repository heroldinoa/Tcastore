<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>T.castore</title><style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

/* header */

.header{
background:#0a5bd3;
padding:10px;
color:white;
}

.search{
background:white;
padding:10px;
border-radius:30px;
display:flex;
align-items:center;
}

.search input{
border:none;
outline:none;
flex:1;
font-size:16px;
}

/* categories */

.categories{
display:flex;
overflow:auto;
gap:10px;
padding:10px;
background:white;
}

.cat{
background:#eee;
padding:8px 15px;
border-radius:20px;
white-space:nowrap;
}

/* banner */

.banner{
background:#cde3a5;
margin:10px;
padding:20px;
border-radius:10px;
}

/* products */

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.product{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
}

.product img{
width:100%;
height:120px;
object-fit:cover;
}

.price{
color:green;
font-weight:bold;
}

button{
background:black;
color:gold;
border:none;
padding:8px;
margin-top:5px;
border-radius:5px;
}

/* cart */

.cart{
position:fixed;
top:15px;
right:15px;
background:white;
padding:8px 12px;
border-radius:20px;
font-weight:bold;
}

#cartBox{
display:none;
position:fixed;
bottom:0;
background:white;
width:100%;
padding:20px;
box-shadow:0 -3px 10px rgba(0,0,0,0.3);
}

/* whatsapp */

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
text-decoration:none;
font-size:20px;
}

</style></head><body><div class="header"><div class="search">
<input placeholder="Search produit...">
</div></div><div class="categories"><div class="cat">Cosmétiques</div>
<div class="cat">Parfum</div>
<div class="cat">Shampoo</div>
<div class="cat">Crème</div></div><div class="banner"><h2>Trending produits</h2>
<p>Bon prix sou cosmétiques</p></div><div class="products"><div class="product">
<img src="vaseline.jpg">
<h3>Vaseline</h3>
<div class="price">$6</div>
<button onclick="addCart('Vaseline',6)">Ajouter</button>
</div><div class="product">
<img src="dove.jpg">
<h3>Dove</h3>
<div class="price">$5</div>
<button onclick="addCart('Dove',5)">Ajouter</button>
</div><div class="product">
<img src="cerave.jpg">
<h3>CeraVe</h3>
<div class="price">$12</div>
<button onclick="addCart('CeraVe',12)">Ajouter</button>
</div><div class="product">
<img src="secret.jpg">
<h3>Secret</h3>
<div class="price">$7</div>
<button onclick="addCart('Secret',7)">Ajouter</button>
</div><div class="product">
<img src="parfum.jpg">
<h3>Parfum</h3>
<div class="price">$20</div>
<button onclick="addCart('Parfum',20)">Ajouter</button>
</div></div><div class="cart" onclick="toggleCart()">
🛒 <span id="count">0</span>
</div><div id="cartBox"><h3>Panier</h3><ul id="items"></ul>Total: $<span id="total">0</span>

<br><br>

<button onclick="order()">Commander WhatsApp</button>

</div><a class="whatsapp" href="https://wa.me/50935206180">💬</a>

<script>

let cart=[]
let total=0

function addCart(name,price){

cart.push({name,price})
total+=price

update()

}

function update(){

document.getElementById("count").innerText=cart.length
document.getElementById("total").innerText=total

let list=document.getElementById("items")
list.innerHTML=""

cart.forEach(i=>{
list.innerHTML+=`<li>${i.name} $${i.price}</li>`
})

}

function toggleCart(){

let box=document.getElementById("cartBox")

box.style.display=box.style.display=="block"?"none":"block"

}

function order(){

let text="Bonjour mwen vle kòmande: "

cart.forEach(i=>{
text+=i.name+" "
})

let url="https://wa.me/50935206180?text="+encodeURIComponent(text)

window.open(url)

}

</script></body>
</html>
