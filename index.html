<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>T.castore</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

header{
background:black;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
}

.logo{
color:gold;
font-size:24px;
font-weight:bold;
}

.search{
width:40%;
padding:8px;
}

.cart{
background:gold;
color:black;
padding:8px 15px;
border-radius:5px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.product{
background:#222;
border:2px solid gold;
border-radius:10px;
padding:15px;
text-align:center;
}

.product img{
width:140px;
}

button{
background:gold;
border:none;
padding:10px;
border-radius:5px;
margin-top:10px;
}

.checkout{
position:fixed;
bottom:80px;
right:20px;
background:gold;
color:black;
padding:12px;
border-radius:8px;
cursor:pointer;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
font-size:22px;
text-decoration:none;
}

</style>
</head>

<body>

<header>

<div class="logo">T.castore</div>

<input class="search" placeholder="Rechercher produit">

<div class="cart">
🛒 <span id="count">0</span>
</div>

</header>

<div class="products">

<div class="product">
<img src="https://i.imgur.com/Qw7npIg.png">
<h3>Vaseline</h3>
<button onclick="addCart('Vaseline')">Ajouter</button>
</div>

<div class="product">
<img src="https://i.imgur.com/ZU3Z6GQ.png">
<h3>Dove</h3>
<button onclick="addCart('Dove')">Ajouter</button>
</div>

<div class="product">
<img src="https://i.imgur.com/H6G7B6s.png">
<h3>CeraVe</h3>
<button onclick="addCart('CeraVe')">Ajouter</button>
</div>

<div class="product">
<img src="https://i.imgur.com/7mG4k1S.png">
<h3>Secret</h3>
<button onclick="addCart('Secret')">Ajouter</button>
</div>

<div class="product">
<img src="https://i.imgur.com/mX4p7bE.png">
<h3>Parfum</h3>
<button onclick="addCart('Parfum')">Ajouter</button>
</div>

</div>

<div class="checkout" onclick="orderWhatsApp()">
Commander
</div>

<a class="whatsapp" href="https://wa.me/50935206180">💬</a>

<script>

let cart = []

function addCart(product){
cart.push(product)
document.getElementById("count").innerText = cart.length
}

function orderWhatsApp(){
let message = "Bonjour, mwen vle kòmande: " + cart.join(", ")
let url = "https://wa.me/50935206180?text=" + encodeURIComponent(message)
window.open(url)
}

</script>

</body>
</html>
