
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>T.castore</title>

<style>
body{
font-family: Arial;
margin:0;
background:#f4f4f4;
}

header{
background:black;
color:white;
text-align:center;
padding:30px;
}

nav{
background:#222;
display:flex;
justify-content:center;
}

nav a{
color:white;
padding:14px 20px;
text-decoration:none;
}

.container{
padding:20px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

footer{
background:black;
color:white;
text-align:center;
padding:20px;
margin-top:30px;
}
</style>
</head>

<body>

<header>
<h1>T.castore</h1>
<p>Beauté • Style • Élégance</p>
</header>

<div class="container">

<h2>Produits Cosmétiques</h2>

<div class="products">

<div class="card">
<h3>Vaseline</h3>
<p>Soin pour la peau</p>
</div>

<div class="card">
<h3>Dove</h3>
<p>Savon corps</p>
</div>

<div class="card">
<h3>Secret</h3>
<p>Déodorant</p>
</div>

<div class="card">
<h3>CeraVe</h3>
<p>Crème hydratante</p>
</div>

<div class="card">
<h3>Shampoo</h3>
<p>Soin cheveux</p>
</div>

</div>

</div>

<footer>
<p>Adresse: Gonaïves - Ruelle Canneaux #11</p>
<p>Paiement: Natcash</p>
<p>Tel: +509 35206180</p>
</footer>

</body>
</html>
