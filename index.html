<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>T.castore</title><style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

.header{
background:#0071ce;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:20px;
font-weight:bold;
}

.cart{
cursor:pointer;
font-size:22px;
}

.search{
background:#0071ce;
padding:10px;
}

.search input{
width:100%;
padding:10px;
border-radius:20px;
border:none;
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.product{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
}

.product img{
width:100%;
height:120px;
object-fit:cover;
}

button{
background:#0071ce;
color:white;
border:none;
padding:8px;
border-radius:6px;
margin-top:5px;
}

#cartBox{
position:fixed;
bottom:0;
width:100%;
background:white;
padding:15px;
display:none;
box-shadow:0 -3px 10px rgba(0,0,0,0.3);
max-height:350px;
overflow:auto;
}

</style></head><body><div class="header"><span>T.castore</span>

<span class="cart" onclick="toggleCart()">
🛒 <span id="count">0</span>
</span></div><div class="search">
<input placeholder="Search produit...">
</div><div class="products"><div class="product">
<img src="https://via.placeholder.com/150">
<h3>Dove</h3>
<p>$5</p>
<button onclick="add('Dove',5)">Ajouter</button>
</div><div class="product">
<img src="https://via.placeholder.com/150">
<h3>Secret</h3>
<p>$7</p>
<button onclick="add('Secret',7)">Ajouter</button>
</div><div class="product">
<img src="https://via.placeholder.com/150">
<h3>Parfum</h3>
<p>$15</p>
<button onclick="add('Parfum',15)">Ajouter</button>
</div><div class="product">
<img src="https://via.placeholder.com/150">
<h3>Vaseline</h3>
<p>$6</p>
<button onclick="add('Vaseline',6)">Ajouter</button>
</div><div class="product">
<img src="https://via.placeholder.com/150">
<h3>CeraVe</h3>
<p>$12</p>
<button onclick="add('CeraVe',12)">Ajouter</button>
</div></div><div id="cartBox"><h3>Panier</h3><ul id="items"></ul><p>Total: $<span id="total">0</span></p><p>🚚 Livraison gratis</p><button onclick="natcash()">Peye Natcash</button>

<button onclick="moncash()">Peye Moncash</button>

</div><script>

let cart=[]
let total=0

function add(name,price){

cart.push({name:name,price:price})

total += price

update()

}

function update(){

let list=document.getElementById("items")

list.innerHTML=""

cart.forEach((item,index)=>{

list.innerHTML +=
"<li>"+item.name+" $"+item.price+
" <button onclick='remove("+index+")'>X</button></li>"

})

document.getElementById("total").innerText=total

document.getElementById("count").innerText=cart.length

}

function remove(index){

total -= cart[index].price

cart.splice(index,1)

update()

}

function toggleCart(){

let box=document.getElementById("cartBox")

if(box.style.display=="block"){
box.style.display="none"
}else{
box.style.display="block"
}

}

function natcash(){

alert("Voye lajan sou Natcash: 35206180")

}

function moncash(){

alert("Voye MonCash sou: 35206180")

}

</script></body>
</html>
