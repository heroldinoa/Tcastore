<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>T.castore</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

header{
background:#232f3e;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:bold;
}

.cart{
background:#ff9900;
padding:8px 15px;
border-radius:5px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.product{
background:white;
border-radius:10px;
padding:15px;
text-align:center;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

.product img{
width:140px;
}

button{
background:#ff9900;
border:none;
padding:10px;
border-radius:5px;
margin-top:10px;
color:white;
}

.checkout{
position:fixed;
bottom:80px;
right:20px;
background:#ff9900;
padding:12px;
border-radius:8px;
color:white;
cursor:pointer;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
font-size:22px;
text-decoration:none;
}

</style>

</head>

<body>

<header>

<div class="logo">T.castore</div>

<div class="cart">
🛒 <span id="count">0</span>
</div>

</header>

<div class="products">

<div class="product">
<img src="https://i.imgur.com/Qw7npIg.png">
<h3>Vaseline</h3>
<button onclick="addCart('Vaseline')">Ajouter</button>
</div>

<div class="product">
<img src="https://i.imgur.com/ZU3Z6GQ.png">
<h3>Dove</h3>
<button onclick="addCart('Dove')">Ajouter</button>
</div>

<div class="product">
<img src="https://i.imgur.com/H6G7B6s.png">
<h3>CeraVe</h3>
<button onclick="addCart('CeraVe')">Ajouter</button>
</div>

<div class="product">
<img src="https://i.imgur.com/7mG4k1S.png">
<h3>Secret</h3>
<button onclick="addCart('Secret')">Ajouter</button>
</div>

<div class="product">
<img src="https://i.imgur.com/mX4p7bE.png">
<h3>Parfum</h3>
<button onclick="addCart('Parfum')">Ajouter</button>
</div>

</div>

<div class="checkout" onclick="orderWhatsApp()">
Commander
</div>

<a class="whatsapp" href="https://wa.me/50935206180">💬</a>

<script>

let cart = []

function addCart(product){
cart.push(product)
document.getElementById("count").innerText = cart.length
alert(product + " ajouté au panier")
}

function orderWhatsApp(){

if(cart.length == 0){
alert("Panier vide")
return
}

let message = "Bonjour, mwen vle kòmande: " + cart.join(", ")

let url = "https://wa.me/50935206180?text=" + encodeURIComponent(message)

window.open(url)

}

</script>

</body>
</html>
