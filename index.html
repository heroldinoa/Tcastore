<!DOCTYPE html>
<html>
<head>
<title>T.castore</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

header{
background:#1976d2;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav a{
color:white;
margin-left:12px;
text-decoration:none;
font-weight:bold;
}

.search{
padding:15px;
background:#1976d2;
}

.search input{
width:100%;
padding:12px;
border-radius:30px;
border:none;
}

.products{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
padding:18px;
}

.product{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.product img{
width:100%;
height:150px;
object-fit:cover;
}

.info{
padding:12px;
text-align:center;
}

.info h3{
margin:5px 0;
}

.price{
font-size:18px;
font-weight:bold;
color:#333;
}

button{
background:#1976d2;
color:white;
border:none;
padding:10px 16px;
border-radius:20px;
margin-top:8px;
}

</style>
</head>

<body>

<header>

<h2>T.castore</h2>

<nav>
<a href="#">Home</a>
<a href="#">Login</a>
<a href="#">Register</a>
<a href="#">🛒0</a>
</nav>

</header>

<div class="search">
<input placeholder="Search produit...">
</div>

<div class="products">

<div class="product">
<img src="https://m.media-amazon.com/images/I/61L3bH2qOIL.jpg">
<div class="info">
<h3>Dove</h3>
<p class="price">$5</p>
<button>Ajouter</button>
</div>
</div>

<div class="product">
<img src="https://m.media-amazon.com/images/I/61QKQ9K4GML.jpg">
<div class="info">
<h3>Secret</h3>
<p class="price">$7</p>
<button>Ajouter</button>
</div>
</div>

<div class="product">
<img src="https://m.media-amazon.com/images/I/71Q8VjYxE9L.jpg">
<div class="info">
<h3>Parfum</h3>
<p class="price">$15</p>
<button>Ajouter</button>
</div>
</div>

<div class="product">
<img src="https://m.media-amazon.com/images/I/71H8dQxYy7L.jpg">
<div class="info">
<h3>Vaseline</h3>
<p class="price">$6</p>
<button>Ajouter</button>
</div>
</div>

</div>

</body>
</html>
