<!DOCTYPE html><html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T.castore</title><style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f4f4f4;
}

header{
background:black;
color:gold;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
}

.logo{
font-size:24px;
font-weight:bold;
}

.cart{
background:gold;
color:black;
padding:8px 15px;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

.livraison{
background:gold;
color:black;
text-align:center;
padding:10px;
font-weight:bold;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.product{
background:white;
border-radius:10px;
padding:15px;
text-align:center;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.product img{
width:150px;
height:150px;
object-fit:cover;
}

button{
background:black;
color:gold;
border:none;
padding:10px;
border-radius:5px;
margin-top:10px;
cursor:pointer;
}

button:hover{
background:gold;
color:black;
}

#cartBox{
display:none;
position:fixed;
top:70px;
right:20px;
width:300px;
background:white;
border-radius:10px;
padding:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
max-height:400px;
overflow:auto;
}

.checkout{
background:gold;
color:black;
padding:12px;
border-radius:8px;
text-align:center;
margin-top:10px;
cursor:pointer;
font-weight:bold;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
font-size:22px;
text-decoration:none;
}

</style></head><body><header><div class="logo">T.castore</div><div class="cart" onclick="toggleCart()">
🛒 <span id="count">0</span>
</div></header><div class="livraison">
🚚 Livraison disponib | Nou livre nan zòn nan
</div><div class="products"><div class="product">
<img src="vaseline.jpg">
<h3>Vaseline</h3>
<p>$6</p>
<button onclick="addCart('Vaseline',6)">Ajouter</button>
</div><div class="product">
<img src="dove.jpg">
<h3>Dove</h3>
<p>$5</p>
<button onclick="addCart('Dove',5)">Ajouter</button>
</div><div class="product">
<img src="cerave.jpg">
<h3>CeraVe</h3>
<p>$12</p>
<button onclick="addCart('CeraVe',12)">Ajouter</button>
</div><div class="product">
<img src="secret.jpg">
<h3>Secret</h3>
<p>$7</p>
<button onclick="addCart('Secret',7)">Ajouter</button>
</div><div class="product">
<img src="parfum.jpg">
<h3>Parfum</h3>
<p>$20</p>
<button onclick="addCart('Parfum',20)">Ajouter</button>
</div></div><div id="cartBox"><h2>Panier</h2><ul id="cartItems"></ul><h3>Total: $<span id="total">0</span></h3><div class="checkout" onclick="orderWhatsApp()">
Commander
</div></div><a class="whatsapp" href="https://wa.me/50935206180">💬</a>

<script>

let cart=[]
let total=0

function addCart(product,price){
cart.push({product,price})
total+=price
updateCart()
}

function updateCart(){

document.getElementById("count").innerText=cart.length
document.getElementById("total").innerText=total

let list=document.getElementById("cartItems")
list.innerHTML=""

cart.forEach((item,index)=>{

list.innerHTML+=`
<li>
${item.product} - $${item.price}
<button onclick="removeItem(${index})">❌</button>
</li>
`

})

}

function removeItem(i){

total-=cart[i].price
cart.splice(i,1)

updateCart()

}

function toggleCart(){

let box=document.getElementById("cartBox")

box.style.display = box.style.display==="block" ? "none" : "block"

}

function orderWhatsApp(){

if(cart.length==0){
alert("Panier vide")
return
}

let products=cart.map(p=>p.product).join(", ")

let message="Bonjour, mwen vle kòmande: "+products+" Total: $"+total

let url="https://wa.me/50935206180?text="+encodeURIComponent(message)

window.open(url)

}

</script></body>
</html>
