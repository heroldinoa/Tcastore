<!DOCTYPE html>
<html>
<head>
<title>T.castore</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
background:black;
color:white;
font-family:Arial;
margin:0;
}

header{
background:black;
color:gold;
text-align:center;
padding:25px;
font-size:28px;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:#111;
border:2px solid gold;
border-radius:10px;
width:200px;
margin:15px;
padding:15px;
text-align:center;
}

.card img{
width:150px;
}

button{
background:gold;
border:none;
padding:10px;
border-radius:5px;
}
</style>
</head>

<body>

<header>
T.castore  
Cosmétiques - Parfums
</header>

<div class="container">

<div class="card">
<img src="vaseline.jpg">
<h3>Vaseline</h3>
<p>Soin de la peau</p>
<button>Commander</button>
</div>

<div class="card">
<img src="dove.jpg">
<h3>Dove</h3>
<p>Savon beauté</p>
<button>Commander</button>
</div>

<div class="card">
<img src="cerave.jpg">
<h3>CeraVe</h3>
<p>Crème hydratante</p>
<button>Commander</button>
</div>

<div class="card">
<img src="parfum.jpg">
<h3>Parfum</h3>
<p>Parfum longue durée</p>
<button>Commander</button>
</div>

</div>

</body>
</html>
